project_id = "vdtjgjhfcmrpbuoabyup"

# Public read-only market data proxy. The upstream gateway API key is injected
# server-side (Edge secret), so we don't need Supabase to gate by JWT.
[functions.market-proxy]
verify_jwt = false

# AI chat (MiniMax) — per-user; requires session JWT.
[functions.ai-chat]
verify_jwt = true

# Public delayed intraday price proxy (Polygon). Key injected server-side.
[functions.polygon-proxy]
verify_jwt = false

# Strategy read — proxies the AWS serving API and caches the generated read.
# Per-user; the strategy card only shows for signed-in users, matching the
# rest of the read UI.
[functions.strategy-read]
verify_jwt = true

# Admin dashboard API — per-user; requires session JWT. The function itself
# enforces the admin email allow-list before any service-role work.
[functions.admin-api]
verify_jwt = true
